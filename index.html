<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Click-n-Mine Game</title>
  <link rel="stylesheet" href="styles.css">
  <script src="jquery-3.7.1.min.js"></script>
</head>
    
<body>
  <div id="game-root">
  <div id="incremental-game">
    <div id="resources-display" style="display:none"></div>

    <div id="page-container">

      <aside class="aside open" id="aside-resources">
        <div class="resource-index">

            <fieldset class="resources__coins">
              <legend class="unselectable">Capital</legend>
              <div class="items-field">
                <div class="resources" data-resource="coins">
                  <img>
                  <span id="count__coins">0</span>
                </div>
                <div class="resources">
                  <img class="purchasable-item auto-miners" id="human-miner" src="images/Miner.png"/>
                  <span id="count__miners"></span>
                  <div id="count__miners-ores">
                    <span id="count__miners-copper"></span>
                  </div>
                </div>
              </div>
            </fieldset>

            <fieldset id="resources__ores">
              <legend class="unselectable">Ore</legend>
              <div class="items-field">
                <div class="resources sellable" id="resource__copper-ore" data-resource="copperOre">
                  <img>
                  <span id="count__copper-ore" value="0">0</span>
                </div>

                <div class="resources sellable" id="resource__tin-ore" data-resource="tinOre">
                  <img>
                  <span id="count__tin-ore" value="0">0</span>
                </div>
              
                <div class="resources sellable hidden" id="resource__iron-ore" data-resource="ironOre">
                  <img>
                  <span id="count__iron-ore" value="0">0</span>
                </div>
              </div>
            </fieldset>

            <fieldset id="resources__ingots" class="hidden">
              <legend class="unselectable">Ingots</legend>
              <div class="items-field">
                <div class="resources sellable" id="resource__bronze-ingot" data-resource="bronzeIngot">
                  <img>
                  <span id="count__bronze-ingot" value="0">0</span>
                </div>

                <div class="resources sellable" id="resource__iron-ingot" data-resource="ironIngot">
                  <img>
                  <span id="count__iron-ingot" value="0">0</span>
                </div>
              </div>
            </fieldset>

            <fieldset id="resources__armour" class="hidden">
              <legend class="unselectable">Armour</legend>
              <div class="items-field">

                <div class="resources sellable" id="resource__bronze-helm" data-resource="bronzeHelm">
                  <img>
                  <span id="count__bronze-helm" value="0">0</span>
                </div>

                <div class="resources sellable" id="resource__bronze-platebody" data-resource="bronzePlatebody">
                  <img>
                  <span id="count__bronze-platebody" value="0">0</span>
                </div>

                <div class="resources sellable" id="resource__bronze-platelegs" data-resource="bronzePlatelegs">
                  <img>
                  <span id="count__bronze-platelegs" value="0">0</span>
                </div>
              </div>
            </fieldset>

            <fieldset id="resources__weapons" class="hidden">
              <legend class="unselectable">Weapons</legend>
              <div class="items-field">
                <div class="resources sellable" id="resource__bronze-sword" data-resource="bronzeSword">
                  <img>
                  <span id="count__bronze-sword" value="0">0</span>
                </div>

                <div class="resources sellable" id="resource__iron-sword" data-resource="ironSword">
                  <img>
                  <span id="count__iron-sword" value="0">0</span>
                </div>
              </div>
            </fieldset>

            <fieldset id="resources__essence" class="hidden">
              <legend class="unselectable">Essence</legend>
              <div class="items-field">

                <div class="resources sellable" id="resource__air-essence" data-resource="airEssence">
                  <img>
                  <span id="count__air-essence" value="0">0</span>
                </div>

                <div class="resources sellable" id="resource__earth-essence" data-resource="earthEssence">
                  <img>
                  <span id="count__earth-essence" value="0">0</span>
                </div>
              
                <div class="resources sellable" id="resource__fire-essence" data-resource="fireEssence">
                  <img>
                  <span id="count__fire-essence" value="0">0</span>
                </div>

                <div class="resources sellable" id="resource__water-essence" data-resource="waterEssence">
                  <img>
                  <span id="count__water-essence" value="0">0</span>
                </div>
            </fieldset>
          </div>
          <button id="toggle-aside-resources"></button>
        </aside>

        <div id="dev-tools" class="hidden">
          <h3>Dev tools</h3>
          <button class="dev-button" id="reset-money">$0</button>
          <button class="dev-button" id="mo-money">+$1000</button>
          <button class="dev-button" id="reset-all">RESET ALL</button>
        </div>

        <button id="show-dev-tools">x</button>
        
      <div id="stage">
        <div class="processors">
          <div class="mines">
            <div id="mines-new" class="new-processor hidden">
              <img src="images/mine-entrance.png" class="ghost-processor">
              <img src="images/plus-icon.png" class="plus-icon">

              <div class="processor-selection mines-new-selection">
                <div class="mine-option" data-mine-type="copper">
                    <img src="images/copper_ore.png"/>
                  </div>
          
                  <div class="mine-option" data-mine-type="tin">
                    <img src="images/tin_ore.png"/>
                  </div>
          
                  <div class="mine-option" data-mine-type="iron">
                    <img src="images/iron_ore.png"/>
                  </div>
              </div>
            </div>
          </div>

          <div class="furnaces hidden">
            <div id="furnaces-new" class="new-processor">
              <img src="images/Furnace.png" class="ghost-processor">
              <img src="images/plus-icon.png" class="plus-icon">  
            </div>
          </div>

      </div>
    </div>

    <aside class="aside collapsed" id="aside-tools">
        <div class="tool-index">

          <fieldset id="furnaces" class="panel-fieldset hidden"> 
            <legend>Furnaces</legend>
            <div id="panel__furnaces">
              <div class="furnace-actions">
                <select id="ingot-selection">
                  <option value="" disabled selected>None</option>
                  <option value="bronzeIngot">Bronze</option>
                  <option value="ironIngot">Iron</option>
                </select>
              <div id="furnace-controls">
                  <button id="smelt-play" class="button-square">
                    <i data-lucide="play" class="icon__controls"></i>
                  </button>
                  <button id="smelt-pause" class="hidden button-square">
                    <i data-lucide="pause" class="icon__controls"></i>
                  </button>
                </div>
              </div>
              <div class="direction-row">
                <img id="furnace-image" src="images\Furnace.png"></img>
                <div id="count__furnace"></div>
              </div>
              <div id="furnace-fuel">
                <img src="images/coal_ore.png" alt="Coal">
                <div id="count__coal"></div>
              </div>
            </div>
          </fieldset>

          <fieldset id="anvils" class="hidden panel-fieldset">
            <legend>Anvils</legend>
            <div id="panel__anvils">
              <div class="anvil-actions">
                <select id="product-selection">
                  <option value="none">None</option>
                  <option value="bronzeHelm">Bronze helmet</option>
                  <option value="bronzePlatebody">Bronze platebody</option>
                  <option value="bronzePlatelegs">Bronze platelegs</option>
                  <option value="bronzeSword">Bronze sword</option>
                  <option value="ironSword">Iron sword</option>
                </select>
                <div id="anvil-controls">
                  <button id="smith-play" class="button-square">
                    <i data-lucide="play"class="icon__controls"></i>
                  </button>
                  <button id="smith-pause" class="hidden button-square">
                    <i data-lucide="pause" class="icon__controls"></i>
                  </button>
                </div>
              </div>
              <div  class="direction-row">
                <img id="anvil-image" src="images\400px-Anvil.png"/>
                <div id="count__anvil"></div>
              </div>
            </div>
          </fieldset>

          <fieldset id="miners" class="panel-fieldset">
            <legend>Miners</legend>
              <div id="panel__miners">
                <div id="miners-container">
                  <img class="purchasable-item auto-miners" id="human-miner" src="images/Miner.png"/>
                  <div id="count__miners-ores"></div>
                  <div id="count__miners"></div>
                </div>
            </div>
          </fieldset>
        </div>
        <button id="toggle-aside-tools"></button>
      </aside>

      <div id="stats-popup"></div>

      <div id="context-menu-sell" class="context-menu hidden">
        <div id="context-equip">Equip</div>
        <div id="context-unequip">Unequip</div>
        <div id="context-sell">Sell</div>
        <div id="context-sell-x">Sell x</div>
        <div id="context-sell-all">Sell all</div>
        <div id="context-add">Add to inventory</div>
        <div id="context-return">Return to resources</div>

        <div id="sell-x-container" class="hidden">
          <input type="number" id="sell-x-input" min="1" />
          <button id="sell-x-confirm">Confirm</button>
        </div>
      </div>
    </div>
  </div>
</div>


<div id="rogue-like-game" class="hidden">

  <div id="node-map">
    <div id="node-container"></div>
    <svg id="node-connections" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></svg>
  </div>

  <div id="combat-ui" class="hidden">
    <div id="arena">
      <div id="player-arena">
        <img src="images/240px-Man_(blue).png" id="player-sprite">
        <div id="player-receives"></div>
        <div class="hp-container">
        <div class="hp-label">Player</div>
        <div class="hp-bar">
          <div id="player-hp-bar" class="hp-fill"></div>
        </div>
        <div id="player-hp-text"></div>
      </div> 
      </div>
      <div id="enemy-arena">
        <img src="images\300px-Goblin.png" id="enemy-sprite">
        <div id="enemy-receives"></div>
        <div class="hp-container">
        <div class="hp-label">Enemy</div>
        <div class="hp-bar">
          <div id="enemy-hp-bar" class="hp-fill enemy"></div>
        </div>
        <div id="enemy-hp-text"></div>
      </div>
      </div>
    </div>

    <div id="combat-hud">
      <div id="stats-display">
        <div id="energy-display"></div>
        <div id="player-hp"></div>
        <div id="enemy-hp"></div>
      </div>
      <div id="combat-menu">
        <button id="start-fight-btn">Start Fight</button>
        <button id="use-item-btn">Use Item</button>
      </div>
    </div>
  </div>
  </div>
</div>

  <aside id="shop-drawer" class="drawer drawer-bottom">
    <div class="drawer-content">
      <div id="shop-content">
        <div id="shop-miners">
          <button id="miner-buy" class="button-default">Hire miner</button>
          <div id="cost__miner"></div>
        </div>
        <div id="shop-furnaces">
          <button id="furnace-buy" class="button-default">Buy furnace</button>
          <div id="cost__furnace"></div>
        </div>
        <div id="shop-anvils" class="hidden">
          <button id="anvil-buy" class="button-default">Buy anvil</button>
          <div id="cost__anvil"></div>
        </div>
      </div>
    </div>
  </aside>

  <aside id="combat-drawer" class="drawer drawer-bottom">
    <div class="drawer-content">
      <div id="combat-content">
        <div id="combat-log">
        </div>
        <div id="combat-controls">
          <button id="combat-start">Start</button>
        </div>
      </div>
    </div>
  </aside>

  <aside id="magic-drawer" class="drawer drawer-bottom">
    <div class="drawer-content">
      <div id="magic-list">
      </div>
    </div>
  </aside>

<!--   <aside id="inventory-drawer" class="drawer drawer-right">
    <div class="drawer-content">
      <div class="player-equipment">
        <div>
          <img src="images/head_slot.png" data-slot="head">
          <img src="images/ammo_slot.png" data-slot="utility">
        </div>
        <div>
          <img src="images/weapon_slot.png" data-slot="weapon">
          <img src="images/body_slot.png" data-slot="chest">
          <img src="images/shield_slot.png" data-slot="offhand">
        </div>
        <div>
          <img src="images/legs_slot.png" data-slot="legs">
        </div>
        <div>
          <img src="images/hands_slot.png" data-slot="hands">
          <img src="images/feet_slot.png" data-slot="feet">
          <img src="images/ring_slot.png" data-slot="jewellery">
        </div>
      </div>

      <div class="player-items"></div>
    </div>
  </aside> -->

  <div class="control-tray">
    <div id="game-message">
      <span id="game-message-text"></span>
      <button id="game-message-close">×</button>
      <div id="game-message-timer"></div>
    </div>
    
    <div class="control-tray-tabs">
      <img
        src="images/pot.png" 
        id="shop-tab"
        class="drawer-tab"
        data-modes="incremental"
      >
      <img
        src="images/combat_icon.png" 
        id="combat-tab"
        class="drawer-tab"
        data-modes="incremental,combat"
      >
      <img
        src="images/Magic.png" 
        id="magic-tab"
        class="drawer-tab"
        data-modes="incremental,combat"
      >
      <!-- <img
        src="images/Inventory.png"
        id="inventory-tab"
        class="drawer-tab"
        data-modes="incremental,combat"
      > -->
      <img
        src="images/Quests.png"
        id="objectives-tab"
        class="drawer-tab"
        data-modes="incremental,combat"
      >
      <!-- <img
        src="images/Logout.png"
        id="ascend-tab"
        class="drawer-tab hidden"
        data-modes="incremental"
      > -->
    </div>

    <div id="objectives-tutorial" class="hidden">
      <p>Click the Objectives icon below for a reminder of your current objective</p>
      <div>
        <button id="dismiss-objectives-tutorial" class="button-small">Got it</button>
      </div>
    </div>

   <!--  <div id="ascend-confirmation" class="hidden">
      <p>Are you ready?</p>
      <button id="ascend-confirm-btn" class="button-default">Yes!</button>
      <button id="ascend-cancel-btn" class="button-default">Not yet</button>
    </div> -->
  </div>

  <div id="tooltip"></div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="js/main.js" defer></script>
</body>
</html>
